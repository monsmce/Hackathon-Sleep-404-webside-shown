services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: viarooms
      POSTGRES_PASSWORD: viarooms
      POSTGRES_DB: viarooms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      
  via-rooms-mapper:
    build: ./src/VIARooms.Mapper
    ports:
      - "5173:5173"

volumes:
  pgdata:
